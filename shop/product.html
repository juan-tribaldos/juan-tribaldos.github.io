<!DOCTYPE html>
<!-- AI-generated: product page — image, story, size dropdown (site component), quantity, add to cart. -->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juan Tribaldos — Print</title>
    <link rel="stylesheet" href="shop.css?v=2">
    <link rel="icon" href="../assets/Generic PC.ico">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="4a839bbc-bc7e-4ccf-9121-51618eac4e73"></script>
    <script>
        function utrack(event, props) {
            if (typeof umami !== 'undefined') {
                props ? umami.track(event, props) : umami.track(event);
            }
        }
    </script>
</head>
<body>

    <script src="js/i18n.js?v=2"></script>
    <script src="js/cart.js?v=2"></script>
    <script src="js/nav.js?v=2"></script>
    <script src="js/whatsapp.js?v=2"></script>
    <script src="js/catalog.js?v=2"></script>

    <main class="shop-main">
        <a class="shop-button back-link" href="index.html" data-i18n="common.backToShopArrow">← Volver a la tienda</a>
        <div id="product-status"></div>
        <div class="product-layout" id="product-layout" style="display: none;">
            <div class="product-image">
                <img id="product-img" src="" alt="">
            </div>
            <div class="product-details">
                <h1 id="product-title"></h1>
                <div class="product-story" id="product-story"></div>
                <div class="product-edition" id="product-edition"></div>

                <div class="product-field-label" data-i18n="common.size">Tamaño</div>
                <div class="custom-select-container size-select">
                    <div class="select-trigger" id="size-trigger" data-i18n="product.chooseSize">Elegí un tamaño</div>
                    <ul class="select-options" id="size-options"></ul>
                </div>

                <div class="product-field-label" data-i18n="common.quantity">Cantidad</div>
                <div class="quantity-row">
                    <button type="button" class="quantity-button" id="qty-minus">−</button>
                    <div class="quantity-value" id="qty-value">1</div>
                    <button type="button" class="quantity-button" id="qty-plus">+</button>
                </div>

                <div class="product-total" id="product-total"></div>

                <button type="button" class="shop-button" id="add-button" disabled data-i18n="product.addToCart">Agregar al carrito</button>
                <div class="added-feedback" id="added-feedback"></div>
                <div class="delivery-note" data-i18n="product.deliveryNote">Impreso a pedido. Juan coordina la entrega personalmente después de la compra.</div>

                <!-- AI-generated: custom order request — quote-then-pay flow. No payment here:
                     Juan quotes by email and paying the emailed link creates the order. -->
                <button type="button" class="custom-request-toggle" id="custom-toggle" data-i18n="product.customToggle">¿Querés una versión personalizada de este print?</button>
                <div class="custom-request-section" id="custom-section">
                    <div class="checkout-form">
                        <label for="custom-text" data-i18n="product.customTell">Contanos qué tenés en mente</label>
                        <textarea id="custom-text" placeholder="Papel, tamaño, acabado, marco… todo lo que quieras personalizar." data-i18n-placeholder="product.customPlaceholder"></textarea>
                        <label for="custom-quantity" data-i18n="common.quantity">Cantidad</label>
                        <input type="number" id="custom-quantity" min="1" max="20" value="1">
                        <label for="custom-name" data-i18n="common.fullName">Nombre completo</label>
                        <input type="text" id="custom-name" autocomplete="name">
                        <label for="custom-email">Email</label>
                        <input type="email" id="custom-email" autocomplete="email">
                        <label for="custom-phone" data-i18n="common.phone">Teléfono</label>
                        <input type="tel" id="custom-phone" autocomplete="tel">
                        <label for="custom-address" data-i18n="common.deliveryAddress">Dirección de entrega</label>
                        <textarea id="custom-address" autocomplete="street-address"></textarea>
                        <div class="form-error" id="custom-error"></div>
                        <button type="button" class="shop-button" id="custom-submit" data-i18n="product.sendRequest">Enviar solicitud</button>
                    </div>
                    <div class="delivery-note" data-i18n="product.customNote">
                        Sin pago por adelantado: Juan revisa tu solicitud y te envía una cotización
                        por email con un link de pago.
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // AI-generated: local pages talk to the local backend, the live site talks to prod —
        // a localhost session can never create real orders by accident.
        const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
            ? 'http://localhost:8080'
            : 'https://api.juantribaldos.com';

        let currentProduct = null;
        let selectedSize = null;
        let quantity = 1;
        // AI-generated: edition stock state — maxQuantity shrinks to the remaining copies and
        // soldOut blocks the add-to-cart button entirely.
        let maxQuantity = 20;
        let soldOut = false;

        function formatUsd(value) {
            // Rounds away float artifacts (e.g. 3 × 120.99) before display.
            return `$${Math.round(value * 100) / 100} USD`;
        }

        function refreshTotal() {
            const total = document.getElementById('product-total');
            if (selectedSize === null) {
                total.textContent = '';
                return;
            }
            total.textContent = `Total: ${formatUsd(selectedSize.priceUsd * quantity)}`;
        }

        function selectSize(size) {
            selectedSize = size;
            document.getElementById('size-trigger').textContent = `${size.label} — ${formatUsd(size.priceUsd)}`;
            if (!soldOut) {
                document.getElementById('add-button').disabled = false;
            }
            refreshTotal();
        }

        // AI-generated: edition availability — shows "quedan N" and blocks buying at zero.
        // Failures degrade silently: the page keeps working and checkout still enforces stock.
        async function loadAvailability(product) {
            try {
                const response = await fetch(`${API_BASE}/api/prints/${product.id}/availability`);
                if (!response.ok) {
                    return;
                }
                const availability = await response.json();
                if (!availability.limited) {
                    return;
                }
                const editionBox = document.getElementById('product-edition');
                if (availability.remaining <= 0) {
                    soldOut = true;
                    editionBox.textContent = t('product.editionSoldOut', { size: availability.editionSize });
                    const addButton = document.getElementById('add-button');
                    addButton.disabled = true;
                    addButton.textContent = t('product.soldOut');
                    return;
                }
                editionBox.textContent = t('product.editionRemaining', { size: availability.editionSize, remaining: availability.remaining });
                maxQuantity = Math.min(20, availability.remaining);
                if (quantity > maxQuantity) {
                    quantity = maxQuantity;
                    document.getElementById('qty-value').textContent = String(quantity);
                    refreshTotal();
                }
            } catch (error) {
                // Network hiccup — leave the page usable; the backend still enforces stock.
            }
        }

        function renderProduct(product) {
            currentProduct = product;
            document.title = `Juan Tribaldos — ${product.title}`;
            document.getElementById('product-img').src = product.displayUrl;
            document.getElementById('product-img').alt = product.title;
            document.getElementById('product-title').textContent = product.title;
            document.getElementById('product-story').textContent = product.story;
            document.getElementById('product-edition').textContent =
                product.edition !== '' ? t('product.edition', { edition: product.edition }) : '';

            const options = document.getElementById('size-options');
            for (const size of product.sizes) {
                const option = document.createElement('li');
                option.textContent = `${size.label} — ${formatUsd(size.priceUsd)}`;
                option.addEventListener('click', () => {
                    selectSize(size);
                    options.classList.remove('open');
                });
                options.appendChild(option);
            }

            document.getElementById('product-layout').style.display = '';
            utrack('product_view', { id: product.id, title: product.title });
        }

        async function loadProduct() {
            const status = document.getElementById('product-status');
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id');
            if (productId === null) {
                status.innerHTML = t('product.notFound');
                return;
            }
            try {
                const product = await JTCatalog.fetchProduct(productId);
                if (product === null) {
                    status.innerHTML = t('product.notFound');
                    return;
                }
                renderProduct(product);
                await loadAvailability(product);
            } catch (error) {
                status.textContent = t('product.loadError');
            }
        }

        document.getElementById('qty-minus').addEventListener('click', () => {
            if (quantity > 1) {
                quantity--;
                document.getElementById('qty-value').textContent = String(quantity);
                refreshTotal();
            }
        });

        document.getElementById('qty-plus').addEventListener('click', () => {
            if (quantity < maxQuantity) {
                quantity++;
                document.getElementById('qty-value').textContent = String(quantity);
                refreshTotal();
            }
        });

        // AI-generated: custom order request — client-side validation mirrors the checkout
        // form; the server re-validates everything and reserves the edition copies.
        function validateCustomForm() {
            const text = document.getElementById('custom-text').value.trim();
            const quantity = parseInt(document.getElementById('custom-quantity').value, 10);
            const name = document.getElementById('custom-name').value.trim();
            const email = document.getElementById('custom-email').value.trim();
            const phone = document.getElementById('custom-phone').value.trim();
            const address = document.getElementById('custom-address').value.trim();

            if (text === '' || name === '' || email === '' || phone === '' || address === '') {
                return t('product.fillAllFields');
            }
            if (email.indexOf('@') < 1 || email.indexOf('.') < 0) {
                return t('common.emailInvalid');
            }
            if (isNaN(quantity) || quantity < 1 || quantity > 20) {
                return t('product.invalidQuantity');
            }
            return '';
        }

        async function submitCustomRequest() {
            if (currentProduct === null) {
                return;
            }

            const errorBox = document.getElementById('custom-error');
            const submitButton = document.getElementById('custom-submit');
            errorBox.textContent = '';

            const validationError = validateCustomForm();
            if (validationError !== '') {
                errorBox.textContent = validationError;
                return;
            }

            const payload = {
                arenaBlockId: currentProduct.id,
                quantity: parseInt(document.getElementById('custom-quantity').value, 10),
                requestText: document.getElementById('custom-text').value.trim(),
                buyerName: document.getElementById('custom-name').value.trim(),
                buyerEmail: document.getElementById('custom-email').value.trim(),
                buyerPhone: document.getElementById('custom-phone').value.trim(),
                deliveryAddress: document.getElementById('custom-address').value.trim()
            };

            submitButton.disabled = true;
            submitButton.textContent = t('product.sending');

            try {
                const response = await fetch(`${API_BASE}/api/custom-orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) {
                    let backendMessage = '';
                    try {
                        const failure = await response.json();
                        backendMessage = failure.errorMessage || '';
                    } catch (parseError) {
                        backendMessage = '';
                    }
                    submitButton.disabled = false;
                    submitButton.textContent = t('product.sendRequest');
                    errorBox.textContent = backendMessage !== ''
                        ? backendMessage
                        : t('product.requestFailed');
                    return;
                }

                document.getElementById('custom-section').innerHTML =
                    '<div class="delivery-note">' + t('product.requestReceived') + '</div>';
                utrack('custom_request_sent', { id: currentProduct.id, title: currentProduct.title });
            } catch (error) {
                submitButton.disabled = false;
                submitButton.textContent = t('product.sendRequest');
                errorBox.textContent = t('product.requestNetworkError');
            }
        }

        document.getElementById('custom-toggle').addEventListener('click', () => {
            const section = document.getElementById('custom-section');
            const isOpen = section.style.display === 'block';
            section.style.display = isOpen ? 'none' : 'block';
            if (!isOpen) {
                utrack('custom_request_opened', { id: currentProduct === null ? '' : currentProduct.id });
            }
        });

        document.getElementById('custom-submit').addEventListener('click', submitCustomRequest);

        document.getElementById('add-button').addEventListener('click', () => {
            if (currentProduct === null || selectedSize === null || soldOut) {
                return;
            }
            JTCart.addItem(currentProduct, selectedSize.label, selectedSize.priceUsd, quantity);
            document.getElementById('added-feedback').innerHTML = t('product.added');
            utrack('add_to_cart', {
                id: currentProduct.id,
                title: currentProduct.title,
                size: selectedSize.label,
                quantity: quantity
            });
        });

        document.addEventListener('DOMContentLoaded', loadProduct);
    </script>
</body>
</html>
