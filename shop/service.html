<!DOCTYPE html>
<!-- AI-generated: service booking page — image, story, price/area/duration, then Fecha and
     Hora selectors fed by the live availability endpoint. Taken slots render disabled. -->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="service.pageTitle">Juan Tribaldos — Servicio</title>
    <link rel="stylesheet" href="shop.css?v=2">
    <link rel="icon" href="../assets/Generic PC.ico">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="4a839bbc-bc7e-4ccf-9121-51618eac4e73"></script>
    <script>
        function utrack(event, props) {
            if (typeof umami !== 'undefined') {
                props ? umami.track(event, props) : umami.track(event);
            }
        }
    </script>
</head>
<body>

    <script src="js/i18n.js?v=2"></script>
    <script src="js/cart.js?v=2"></script>
    <script src="js/nav.js?v=2"></script>
    <script src="js/whatsapp.js?v=2"></script>
    <script src="js/catalog.js?v=2"></script>

    <main class="shop-main">
        <a class="shop-button back-link" href="index.html?category=services" data-i18n="common.backToShopArrow">← Volver a la tienda</a>
        <div id="service-status"></div>
        <div class="product-layout" id="service-layout" style="display: none;">
            <div class="product-image">
                <img id="service-img" src="" alt="">
            </div>
            <div class="product-details">
                <h1 id="service-title"></h1>
                <div class="product-story" id="service-story"></div>
                <div class="product-edition" id="service-meta"></div>
                <div class="product-total" id="service-price"></div>

                <div class="product-field-label" data-i18n="service.date">Fecha</div>
                <div class="custom-select-container size-select">
                    <div class="select-trigger" id="date-trigger" data-i18n="service.chooseDate">Elegí una fecha</div>
                    <ul class="select-options slot-options" id="date-options"></ul>
                </div>

                <div class="product-field-label" data-i18n="service.time">Hora</div>
                <div class="custom-select-container size-select">
                    <div class="select-trigger" id="time-trigger" data-i18n="service.chooseTime">Elegí una hora</div>
                    <ul class="select-options slot-options" id="time-options"></ul>
                </div>

                <button type="button" class="shop-button" id="book-button" disabled data-i18n="service.book">Reservar</button>
                <div class="added-feedback" id="added-feedback"></div>
                <div class="delivery-note" data-i18n="service.bookingNote">
                    La fecha y hora quedan reservadas al completar el pago. Juan se pondrá en
                    contacto para coordinar los detalles de la sesión.
                </div>
            </div>
        </div>
    </main>

    <script>
        // AI-generated: local pages talk to the local backend, the live site talks to prod —
        // a localhost session can never create real orders by accident.
        const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
            ? 'http://localhost:8080'
            : 'https://api.juantribaldos.com';

        let currentService = null;
        let unavailableSlots = [];
        let selectedDate = '';
        let selectedTime = '';

        function formatDateLabel(isoDate) {
            const parts = isoDate.split('-');
            return `${parts[2]}/${parts[1]}/${parts[0]}`;
        }

        function buildOfferedDates(service) {
            // Iterate the inclusive [dateStart, dateEnd] window as ISO strings.
            const dates = [];
            const cursor = new Date(`${service.dateStart}T00:00:00`);
            const end = new Date(`${service.dateEnd}T00:00:00`);
            while (cursor <= end) {
                const year = cursor.getFullYear();
                const month = String(cursor.getMonth() + 1).padStart(2, '0');
                const day = String(cursor.getDate()).padStart(2, '0');
                dates.push(`${year}-${month}-${day}`);
                cursor.setDate(cursor.getDate() + 1);
            }
            return dates;
        }

        function isSlotUnavailable(isoDate, time) {
            return unavailableSlots.includes(`${isoDate}T${time}`);
        }

        function isDateFullyUnavailable(isoDate) {
            for (const time of currentService.startTimes) {
                if (!isSlotUnavailable(isoDate, time)) {
                    return false;
                }
            }
            return true;
        }

        function refreshBookButton() {
            document.getElementById('book-button').disabled = selectedDate === '' || selectedTime === '';
        }

        function renderTimeOptions() {
            const options = document.getElementById('time-options');
            options.innerHTML = '';
            selectedTime = '';
            document.getElementById('time-trigger').textContent = t('service.chooseTime');
            refreshBookButton();

            if (selectedDate === '') {
                return;
            }

            for (const time of currentService.startTimes) {
                const option = document.createElement('li');
                if (isSlotUnavailable(selectedDate, time)) {
                    option.textContent = t('service.slotUnavailable', { time: time });
                    option.setAttribute('disabled', 'disabled');
                } else {
                    option.textContent = time;
                    option.addEventListener('click', () => {
                        selectedTime = time;
                        document.getElementById('time-trigger').textContent = time;
                        options.classList.remove('open');
                        refreshBookButton();
                    });
                }
                options.appendChild(option);
            }
        }

        function renderDateOptions() {
            const options = document.getElementById('date-options');
            options.innerHTML = '';
            const offeredDates = buildOfferedDates(currentService);

            for (const isoDate of offeredDates) {
                const option = document.createElement('li');
                if (isDateFullyUnavailable(isoDate)) {
                    option.textContent = t('service.dateFull', { date: formatDateLabel(isoDate) });
                    option.setAttribute('disabled', 'disabled');
                } else {
                    option.textContent = formatDateLabel(isoDate);
                    option.addEventListener('click', () => {
                        selectedDate = isoDate;
                        document.getElementById('date-trigger').textContent = formatDateLabel(isoDate);
                        options.classList.remove('open');
                        renderTimeOptions();
                    });
                }
                options.appendChild(option);
            }
        }

        async function loadAvailability(serviceId) {
            const response = await fetch(`${API_BASE}/api/services/${serviceId}/availability`);
            if (!response.ok) {
                throw new Error(`Availability request failed: ${response.status}`);
            }
            const payload = await response.json();
            return payload.unavailable || [];
        }

        function renderService(service) {
            currentService = service;
            document.title = `Juan Tribaldos — ${service.title}`;
            document.getElementById('service-img').src = service.displayUrl;
            document.getElementById('service-img').alt = service.title;
            document.getElementById('service-title').textContent = service.title;
            document.getElementById('service-story').textContent = service.story;

            const durationDisplay = String(service.durationHours).replace('.5', '.5');
            const metaParts = [];
            if (service.area !== '') {
                metaParts.push(t('service.area', { area: service.area }));
            }
            metaParts.push(t('service.duration', { hours: durationDisplay }));
            document.getElementById('service-meta').textContent = metaParts.join(' — ');
            document.getElementById('service-price').textContent = t('service.price', { price: service.priceUsd });

            renderDateOptions();
            document.getElementById('service-layout').style.display = '';
            utrack('service_view', { id: service.id, title: service.title });
        }

        async function loadService() {
            const status = document.getElementById('service-status');
            const params = new URLSearchParams(window.location.search);
            const serviceId = params.get('id');
            if (serviceId === null) {
                status.innerHTML = t('service.notFound');
                return;
            }
            try {
                const service = await JTServiceCatalog.fetchService(serviceId);
                if (service === null) {
                    status.innerHTML = t('service.notFound');
                    return;
                }
                unavailableSlots = await loadAvailability(serviceId);
                renderService(service);
            } catch (error) {
                status.textContent = t('service.loadError');
            }
        }

        document.getElementById('book-button').addEventListener('click', () => {
            if (currentService === null || selectedDate === '' || selectedTime === '') {
                return;
            }
            const slotLabel = `${formatDateLabel(selectedDate)} ${selectedTime}`;
            const added = JTCart.addServiceItem(currentService, selectedDate, selectedTime, slotLabel);
            const feedback = document.getElementById('added-feedback');
            if (!added) {
                feedback.textContent = t('service.alreadyInCart');
                return;
            }
            feedback.innerHTML = t('service.added');
            utrack('add_to_cart', {
                id: currentService.id,
                title: currentService.title,
                slot: slotLabel,
                type: 'service'
            });
        });

        document.addEventListener('DOMContentLoaded', loadService);
    </script>
</body>
</html>
