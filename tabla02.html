<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivo | Juan Tribaldos</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/IMG_9979.ico">

    <style>
        /* Estilos específicos para los controles de la tabla */
        main { padding: 100px 20px; max-width: 1000px; margin: 0 auto; }
        
        .table-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
            align-items: center;
            font-family: 'Times New Roman', serif;
        }

        #searchInput {
            padding: 8px;
            border: 1px solid #000;
            background: transparent;
            font-family: inherit;
            width: 250px;
        }

        /* Selector de columnas estilo Gregory Cotton */
        .column-selectors {
            display: flex;
            gap: 15px;
            font-size: 12px;
            text-transform: uppercase;
        }

        .column-selectors label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .column-selectors input[type="checkbox"] {
            cursor: pointer;
            accent-color: #000;
        }

        /* Estilos de la Tabla */
        #arena-table { 
            width: 100%; 
            border-collapse: collapse; 
            font-family: 'Times New Roman', serif; 
            font-size: 12px; 
            border: 1px solid #000; 
            background-color: #fff; 
        }
        
        #arena-table thead th { 
            background-color: #d1d1d1; 
            border: 1px solid #000; 
            padding: 10px; 
            text-align: left; 
            cursor: pointer;
            text-transform: uppercase;
        }

        #arena-table td { 
            border: 1px solid #000; 
            padding: 8px 10px; 
            vertical-align: top; 
        }

        #arena-table tr:hover { background-color: #f0f0f0; }

        .sort-indicator { margin-left: 5px; font-size: 10px; }
        
        a.arena-link { color: #000; text-decoration: underline; }
    </style>
</head>
<body>

    <main>
        <div class="table-controls">
            <input type="text" id="searchInput" placeholder="BUSCAR EN EL ARCHIVO...">
            
            <div class="column-selectors" id="columnSelectors">
                </div>
        </div>

        <table id="arena-table">
            <thead>
                <tr id="table-headers">
                    </tr>
            </thead>
            <tbody id="table-body">
                <tr>
                    <td colspan="100%" style="text-align:center; padding: 20px;">Cargando canal de Are.na...</td>
                </tr>
            </tbody>
        </table>
    </main>

    <script src="nav.js"></script>

    <script src="config-arena.js"></script>

<script>
    // MOTOR DE DATOS: Carga los canales definidos en config-arena.js
    async function fetchAllChannels() {
        try {
            const requests = ARENA_CONFIG.channels.map(slug => 
                fetch(`https://api.are.na/v2/channels/${slug}/contents?per=100`).then(res => res.json())
            );

            const results = await Promise.all(requests);
            const combined = results.flatMap(data => data.contents || []);

            return combined.map(item => ({
                Title: item.title || 'Untitled',
                Type: item.class || 'N/A',
                Date: item.created_at ? new Date(item.created_at).toLocaleDateString('es-ES') : '-',
                RawDate: item.created_at || '',
                Class: item.base_class || 'N/A',
                Link: item.source ? item.source.url : (item.attachment ? item.attachment.url : `https://www.are.na/block/${item.id}`)
            }));
        } catch (error) {
            console.error("Error cargando Are.na:", error);
            return [];
        }
    }

    // INTERFAZ: Dibuja la tabla usando activeColumns de config-arena.js
    function renderTable(data) {
        const headRow = document.getElementById('table-headers');
        const tbody = document.getElementById('table-body');

        headRow.innerHTML = activeColumns.map(col => `
            <th onclick="handleSort('${col}')">
                ${col.toUpperCase()} 
                <span class="sort-indicator">${sortCol === col ? (sortDir === 'asc' ? '▲' : '▼') : ''}</span>
            </th>
        `).join('');

        tbody.innerHTML = data.map(item => `
            <tr>
                ${activeColumns.map(col => {
                    if (col === 'Link') return `<td><a class="arena-link" href="${item[col]}" target="_blank">VIEW ↗</a></td>`;
                    return `<td>${item[col] || '-'}</td>`;
                }).join('')}
            </tr>
        `).join('');
    }

    // SELECTOR DE COLUMNAS
    function initColumnSelectors() {
        const container = document.getElementById('columnSelectors');
        container.innerHTML = ARENA_CONFIG.allColumns.map(col => `
            <label>
                <input type="checkbox" ${activeColumns.includes(col) ? 'checked' : ''} 
                       onchange="toggleColumn('${col}')">
                ${col}
            </label>
        `).join('');
    }

    function toggleColumn(col) {
        if (activeColumns.includes(col)) {
            if (activeColumns.length > 1) activeColumns = activeColumns.filter(c => c !== col);
        } else {
            activeColumns.push(col);
        }
        savePrefs(); // Función de config-arena.js
        renderTable(currentData);
    }

    // ORDENACIÓN
    function handleSort(col) {
        if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        else { sortCol = col; sortDir = 'asc'; }
        
        currentData.sort((a, b) => {
            let vA = a[col], vB = b[col];
            if (col === 'Date') { vA = a.RawDate; vB = b.RawDate; }
            return sortDir === 'asc' ? vA.localeCompare(vB) : vB.localeCompare(vA);
        });
        renderTable(currentData);
    }

    // INICIO
    document.addEventListener('DOMContentLoaded', async () => {
        initColumnSelectors();
        currentData = await fetchAllChannels();
        handleSort('Date'); 
    });
</script>
</body>
</html>
