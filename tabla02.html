<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivo | Juan Tribaldos</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/IMG_9979.ico">

    <style>
        /* Estilos específicos para los controles de la tabla */
        main { padding: 100px 20px; max-width: 1000px; margin: 0 auto; }
        
        .table-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
            align-items: center;
            font-family: 'Times New Roman', serif;
        }

        #searchInput {
            padding: 8px;
            border: 1px solid #000;
            background: transparent;
            font-family: inherit;
            width: 250px;
        }

        /* Selector de columnas estilo Gregory Cotton */
        .column-selectors {
            display: flex;
            gap: 15px;
            font-size: 12px;
            text-transform: uppercase;
        }

        .column-selectors label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .column-selectors input[type="checkbox"] {
            cursor: pointer;
            accent-color: #000;
        }

        /* Estilos de la Tabla */
        #arena-table { 
            width: 100%; 
            border-collapse: collapse; 
            font-family: 'Times New Roman', serif; 
            font-size: 12px; 
            border: 1px solid #000; 
            background-color: #fff; 
        }
        
        #arena-table thead th { 
            background-color: #d1d1d1; 
            border: 1px solid #000; 
            padding: 10px; 
            text-align: left; 
            cursor: pointer;
            text-transform: uppercase;
        }

        #arena-table td { 
            border: 1px solid #000; 
            padding: 8px 10px; 
            vertical-align: top; 
        }

        #arena-table tr:hover { background-color: #f0f0f0; }

        .sort-indicator { margin-left: 5px; font-size: 10px; }
        
        a.arena-link { color: #000; text-decoration: underline; }
    </style>
</head>
<body>

    <main>
        <div class="table-controls">
            <input type="text" id="searchInput" placeholder="BUSCAR EN EL ARCHIVO...">
            
            <div class="column-selectors" id="columnSelectors">
                </div>
        </div>

        <table id="arena-table">
            <thead>
                <tr id="table-headers">
                    </tr>
            </thead>
            <tbody id="table-body">
                <tr>
                    <td colspan="100%" style="text-align:center; padding: 20px;">Cargando canal de Are.na...</td>
                </tr>
            </tbody>
        </table>
    </main>

    <script src="nav.js"></script>

<script src="config-arena.js"></script>
<script src="arena-manager.js"></script>
<script src="table-render.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        // 1. Crear los selectores de columnas (Checkboxes)
        const container = document.getElementById('columnSelectors');
        if (container) {
            container.innerHTML = ARENA_CONFIG.allColumns.map(col => `
                <label>
                    <input type="checkbox" ${activeColumns.includes(col) ? 'checked' : ''} 
                           onchange="toggleColumn('${col}')">
                    ${col}
                </label>
            `).join('');
        }

        // 2. Configurar el buscador
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            // filterData y debounce vienen de arena-manager.js
            searchInput.addEventListener('input', debounce((e) => {
                const filtered = filterData(e.target.value);
                renderTable(filtered);
            }, 300));
        }
        
        // 3. Cargar los datos de los canales
        currentData = await fetchArenaItems(); 
        
        // 4. Dibujar la tabla inicial
        renderTable(currentData);
    });

    // Función auxiliar para los checkboxes que llama a renderTable (de table-render.js)
    function toggleColumn(col) {
        if (activeColumns.includes(col)) {
            if (activeColumns.length > 1) activeColumns = activeColumns.filter(c => c !== col);
        } else {
            activeColumns.push(col);
        }
        savePrefs(); // Viene de config-arena.js
        renderTable(currentData);
    }
</script>
</body>
</html>
